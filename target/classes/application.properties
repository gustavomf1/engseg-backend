server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/engseg
spring.datasource.username=engseg
spring.datasource.password=engseg123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.scheduling.enabled=true

jwt.secret=engseg-secret-key-2026-very-long-and-secure-key-for-jwt-token-authentication
jwt.expiration=86400000

# S3/MinIO Configuration
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.access-key=${S3_ACCESS_KEY:minioadmin}
s3.secret-key=${S3_SECRET_KEY:minioadmin}
s3.bucket=${S3_BUCKET:engseg-evidencias}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
