server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/engseg}
spring.datasource.username=${DB_USERNAME:engseg}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.scheduling.enabled=true

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# S3/MinIO Configuration
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.access-key=${S3_ACCESS_KEY}
s3.secret-key=${S3_SECRET_KEY}
s3.bucket=${S3_BUCKET:engseg-evidencias}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
