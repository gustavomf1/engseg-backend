version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: engseg
      POSTGRES_USER: engseg
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatorio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engseg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engseg-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY obrigatorio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY obrigatorio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engseg-network

  redpanda:
    image: redpandadata/redpanda:v23.3.5
    container_name: engseg-redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://engseg-redpanda:9092
    ports:
      - "9092:9092"
    networks:
      - engseg-network

  engseg-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/engseg
      DB_USERNAME: engseg
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatorio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY obrigatorio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY obrigatorio}
      S3_BUCKET: engseg-evidencias
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      BREVO_API_KEY: ${BREVO_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      APP_FRONTEND_URL: ${FRONTEND_URL}
      KAFKA_BOOTSTRAP_SERVERS: engseg-redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    networks:
      - engseg-network

volumes:
  postgres_data:
  minio_data:

networks:
  engseg-network:
    name: engseg-network
    driver: bridge
