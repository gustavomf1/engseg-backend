version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: engseg
      POSTGRES_USER: engseg
      POSTGRES_PASSWORD: engseg123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engseg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engseg-network

  engseg-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/engseg
      SPRING_DATASOURCE_USERNAME: engseg
      SPRING_DATASOURCE_PASSWORD: engseg123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - engseg-network

volumes:
  postgres_data:

networks:
  engseg-network:
    name: engseg-network
    driver: bridge
