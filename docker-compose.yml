version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: engseg
      POSTGRES_USER: engseg
      POSTGRES_PASSWORD: F
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engseg"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engseg-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engseg-network

  engseg-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/engseg
      DB_USERNAME: engseg
      DB_PASSWORD: engseg123
      JWT_SECRET: engseg-secret-key-2026-very-long-and-secure-key-for-jwt-token-authentication
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: engseg-evidencias
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
      APP_FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - engseg-network

volumes:
  postgres_data:
  minio_data:

networks:
  engseg-network:
    name: engseg-network
    driver: bridge
